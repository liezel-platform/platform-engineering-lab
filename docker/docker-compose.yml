services:

  controller-1:
    image: confluentinc/cp-kafka:7.9.8
    container_name: controller-1
    hostname: controller-1

    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: controller

      KAFKA_CONTROLLER_QUORUM_VOTERS: >-
        1@controller-1:29093,
        2@controller-2:29093,
        3@controller-3:29093

      KAFKA_LISTENERS: CONTROLLER://controller-1:29093

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

    volumes:
      - controller1-data:/var/lib/kafka/data


  controller-2:
    image: confluentinc/cp-kafka:7.9.8
    container_name: controller-2
    hostname: controller-2

    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: controller

      KAFKA_CONTROLLER_QUORUM_VOTERS: >-
        1@controller-1:29093,
        2@controller-2:29093,
        3@controller-3:29093

      KAFKA_LISTENERS: CONTROLLER://controller-2:29093

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

    volumes:
      - controller2-data:/var/lib/kafka/data


  controller-3:
    image: confluentinc/cp-kafka:7.9.8
    container_name: controller-3
    hostname: controller-3

    environment:
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: controller

      KAFKA_CONTROLLER_QUORUM_VOTERS: >-
        1@controller-1:29093,
        2@controller-2:29093,
        3@controller-3:29093

      KAFKA_LISTENERS: CONTROLLER://controller-3:29093

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

    volumes:
      - controller3-data:/var/lib/kafka/data


  kafka-1:
    image: confluentinc/cp-kafka:7.9.8
    container_name: kafka-1
    hostname: kafka-1

    ports:
      - "9092:9092"

    environment:
      KAFKA_NODE_ID: 101
      KAFKA_PROCESS_ROLES: broker

      KAFKA_CONTROLLER_QUORUM_VOTERS: >-
        1@controller-1:29093,
        2@controller-2:29093,
        3@controller-3:29093

      KAFKA_LISTENERS: >-
        INTERNAL://kafka-1:29092,
        EXTERNAL://0.0.0.0:9092

      KAFKA_ADVERTISED_LISTENERS: >-
        INTERNAL://kafka-1:29092,
        EXTERNAL://localhost:9092

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: >-
        INTERNAL:PLAINTEXT,
        EXTERNAL:PLAINTEXT,
        CONTROLLER:PLAINTEXT

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

    volumes:
      - kafka1-data:/var/lib/kafka/data

    depends_on:
      - controller-1
      - controller-2
      - controller-3


  kafka-2:
    image: confluentinc/cp-kafka:7.9.8
    container_name: kafka-2
    hostname: kafka-2

    ports:
      - "9093:9093"

    environment:
      KAFKA_NODE_ID: 102
      KAFKA_PROCESS_ROLES: broker

      KAFKA_CONTROLLER_QUORUM_VOTERS: >-
        1@controller-1:29093,
        2@controller-2:29093,
        3@controller-3:29093

      KAFKA_LISTENERS: >-
        INTERNAL://kafka-2:29092,
        EXTERNAL://0.0.0.0:9093

      KAFKA_ADVERTISED_LISTENERS: >-
        INTERNAL://kafka-2:29092,
        EXTERNAL://localhost:9093

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: >-
        INTERNAL:PLAINTEXT,
        EXTERNAL:PLAINTEXT,
        CONTROLLER:PLAINTEXT

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

    volumes:
      - kafka2-data:/var/lib/kafka/data

    depends_on:
      - controller-1
      - controller-2
      - controller-3


  kafka-3:
    image: confluentinc/cp-kafka:7.9.8
    container_name: kafka-3
    hostname: kafka-3

    ports:
      - "9094:9094"

    environment:
      KAFKA_NODE_ID: 103
      KAFKA_PROCESS_ROLES: broker

      KAFKA_CONTROLLER_QUORUM_VOTERS: >-
        1@controller-1:29093,
        2@controller-2:29093,
        3@controller-3:29093

      KAFKA_LISTENERS: >-
        INTERNAL://kafka-3:29092,
        EXTERNAL://0.0.0.0:9094

      KAFKA_ADVERTISED_LISTENERS: >-
        INTERNAL://kafka-3:29092,
        EXTERNAL://localhost:9094

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: >-
        INTERNAL:PLAINTEXT,
        EXTERNAL:PLAINTEXT,
        CONTROLLER:PLAINTEXT

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

    volumes:
      - kafka3-data:/var/lib/kafka/data

    depends_on:
      - controller-1
      - controller-2
      - controller-3


  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui

    ports:
      - "8080:8080"

    environment:
      KAFKA_CLUSTERS_0_NAME: dedicated-kraft-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: >-
        kafka-1:29092,
        kafka-2:29092,
        kafka-3:29092

    depends_on:
      - kafka-1
      - kafka-2
      - kafka-3


volumes:
  controller1-data:
  controller2-data:
  controller3-data:
  kafka1-data:
  kafka2-data:
  kafka3-data:
